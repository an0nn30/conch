<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Mobile viewport: full bleed, no scaling, honor safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- iOS web-app / PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Conch">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#282a36">

  <title>Conch</title>

  <!-- CSS: theme variables first, then layout -->
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/terminal.css">

  <!-- xterm.js (canvas renderer for iOS WKWebView) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.js"></script>
</head>
<body>
  <!-- App shell -->
  <div id="app">
    <!-- Terminal overlay (hidden by default, shown on SSH connect) -->
    <div id="terminal-view">
      <div class="terminal-header">
        <button class="terminal-back-btn" id="terminal-back">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
        <span class="terminal-title" id="terminal-title">Connecting...</span>
        <button class="terminal-disconnect-btn" id="terminal-disconnect">Disconnect</button>
      </div>
      <div id="terminal-container"></div>
      <div class="accessory-bar" id="accessory-bar"></div>
    </div>

    <!-- Scrollable tab content area -->
    <div id="tab-content"></div>

    <!-- Solid bottom tab bar (no blur, no floating) -->
    <nav id="tab-bar" role="tablist" aria-label="Main navigation"></nav>
  </div>

  <!-- Utilities (must load before anything that calls window.utils) -->
  <script src="utils.js"></script>
  <script src="toast.js"></script>

  <!-- Tab bar controller -->
  <script src="tab-bar.js"></script>

  <!-- Tab content modules -->
  <script src="connections.js"></script>
  <script src="vault.js"></script>
  <script src="profile.js"></script>
  <script src="terminal.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Register render functions for each tab
      window.tabBar.register('connections', () => window.connectionsTab.render());
      window.tabBar.register('vault',       () => window.vaultTab.render());
      window.tabBar.register('profile',     () => window.profileTab.render());

      // Mount tab bar (renders default active tab: connections)
      window.tabBar.init();
      window.terminalView.init();
    });
  </script>
</body>
</html>
