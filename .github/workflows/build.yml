# =============================================================================
# MobaMacOS Terminal — CI / Release pipeline
#
# Every push to main:
#   1. Builds + tests on macOS (arm64 + x86_64) and Windows in parallel
#   2. Packages platform-native installers versioned 1.0.<run_number>
#   3. Creates a GitHub Release with all three installers attached
#
# macOS runners:
#   macos-latest  → arm64  (Apple Silicon M-series)   — 3x Linux rate
#   macos-13      → x86_64 (Intel)                    — 3x Linux rate
#
# jpackage bundles the JRE of the host platform, so we must build on each
# arch separately — there is no universal binary option.
# =============================================================================

name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  APP_VERSION: 1.0.${{ github.run_number }}

jobs:

  # ── macOS .app + .dmg (arm64 and x86_64) ───────────────────────────────────
  build-mac:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest   # arm64 — Apple Silicon
            arch:   arm64
          - runner: macos-13       # x86_64 — Intel
            arch:   x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      - name: Generate macOS icon (.icns)
        run: make icons-mac

      - name: Package .app
        run: make APP_VERSION=$APP_VERSION app-mac

      - name: Package .dmg
        run: make APP_VERSION=$APP_VERSION dmg

      # Rename the .dmg to include the CPU architecture so both files can
      # coexist in the same release (e.g. MobaMacOS Terminal-1.0.5-arm64.dmg).
      - name: Rename .dmg with architecture suffix
        run: |
          for f in dist/mac/*.dmg; do
            mv "$f" "${f%.dmg}-${{ matrix.arch }}.dmg"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dist-${{ matrix.arch }}
          path: dist/mac/*.dmg
          retention-days: 30

  # ── Windows .exe ───────────────────────────────────────────────────────────
  build-win:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build + test
        run: mvn package -q

      # Stage the fat JAR manually (avoids re-invoking Maven via the PHONY
      # `jar` → `stage` dependency chain in the Makefile).
      - name: Stage JAR
        shell: bash
        run: |
          mkdir -p target/package-input
          cp target/mobamacos-terminal-0.1.0-SNAPSHOT.jar target/package-input/

      # ImageMagick (magick) is pre-installed on windows-latest.
      - name: Generate Windows icon (.ico)
        shell: bash
        run: |
          magick src/main/package/app-icon-512.png \
            -define icon:auto-resize=256,128,64,48,32,16 \
            src/main/package/mobamacos-terminal.ico

      # WiX Toolset 3.x is required by jpackage --type exe.
      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Package .exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\win | Out-Null
          & "$env:JAVA_HOME\bin\jpackage" `
            --input          "target\package-input"                      `
            --main-jar       "mobamacos-terminal-0.1.0-SNAPSHOT.jar"     `
            --main-class     "com.mobamacos.Main"                        `
            --name           "MobaMacOS Terminal"                        `
            --app-version    "$env:APP_VERSION"                          `
            --vendor         "MobaMacOS"                                 `
            --description    "A MobaXterm-inspired SSH client for macOS" `
            --java-options   "-Xmx512m"                                  `
            --java-options   "-Dfile.encoding=UTF-8"                     `
            --type           exe                                         `
            --dest           "dist\win"                                  `
            --icon           "src\main\package\mobamacos-terminal.ico"   `
            --win-dir-chooser                                            `
            --win-menu                                                   `
            --win-shortcut                                               `
            --win-shortcut-prompt

      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/win/
          retention-days: 30

  # ── GitHub Release (every push to main) ────────────────────────────────────
  release:
    name: Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Download all three artifacts into a flat staging directory.
      - uses: actions/download-artifact@v4
        with:
          pattern: macos-dist-*
          merge-multiple: true
          path: dist/mac/

      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/win/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$APP_VERSION" \
            --title "MobaMacOS Terminal v$APP_VERSION" \
            --generate-notes \
            dist/mac/*.dmg \
            dist/win/*.exe
